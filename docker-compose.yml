
services:
  backend:
    build:
      context: ./backend
    expose:
      - "4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://api.scalelab.easycase.site
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://api.scalelab.easycase.site
    depends_on:
      - backend
    restart: always

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always
