
services:
  backend:
    build:
      context: ./backend
    expose:
      - "4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=postgres://3d13d8e9694d449193d00d486efdd96ef1998d11dc2731566f9752c0fb4cf260:sk_fHptR9VSf1QiAp-N9TE8X@db.prisma.io:5432/postgres?sslmode=require
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://api.scalelab.easycase.site
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://api.scalelab.easycase.site
    depends_on:
      - backend
    restart: always

  proxy:
    image: jonasal/nginx-certbot:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_EMAIL=vanujakofficial@gmail.com
    volumes:
      - ./nginx.conf:/etc/nginx/user_conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    restart: always
